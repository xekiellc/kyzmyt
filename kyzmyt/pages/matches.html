<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9WSYHBGQZZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-9WSYHBGQZZ');
</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kyzmyt — My Matches</title>
  <link rel="stylesheet" href="/css/design-system.css" />
  <style>
    .matches-page { min-height: 100vh; background: var(--cream); padding-bottom: 80px; }
    .matches-header { padding: 14px 16px; background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
    .matches-content { padding: 16px; max-width: 480px; margin: 0 auto; }
    .new-matches-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 20px; }
    .new-matches-row::-webkit-scrollbar { display: none; }
    .new-match-bubble { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .match-ring { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--copper); padding: 3px; position: relative; }
    .match-ring-inner { width: 54px; height: 54px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 20px; color: white; }
    .match-new-badge { position: absolute; top: -2px; right: -2px; width: 18px; height: 18px; border-radius: 50%; background: var(--copper); color: white; font-size: 9px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--cream); font-weight: 500; }
    .match-bubble-name { font-size: 11px; color: var(--text-muted); text-align: center; max-width: 64px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .match-list-item { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 14px; margin-bottom: 10px; display: flex; gap: 14px; align-items: flex-start; cursor: pointer; transition: all 0.2s; }
    .match-list-item:hover { border-color: var(--copper); box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .match-info { flex: 1; }
    .match-name { font-size: 15px; font-weight: 500; color: var(--navy); margin-bottom: 3px; }
    .match-preview { font-size: 13px; color: var(--text-muted); }
    .match-time { font-size: 11px; color: var(--text-muted); }
    .match-compat-pill { background: var(--copper-pale); color: var(--copper); border-radius: var(--radius-full); padding: 4px 10px; font-size: 12px; font-weight: 500; white-space: nowrap; }
    .match-compat-pill.high { background: var(--success-bg); color: var(--success); }
    .match-actions { display: flex; gap: 6px; margin-top: 10px; }
    .likes-you-section { margin-bottom: 20px; }
    .blurred-profile { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 14px; display: flex; gap: 12px; align-items: center; margin-bottom: 8px; }
    .blurred-avatar { width: 44px; height: 44px; border-radius: 50%; filter: blur(8px); background: var(--copper); display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
    .blurred-name { font-size: 14px; color: transparent; background: var(--border-mid); border-radius: 4px; width: 100px; height: 16px; }
    .blurred-sub { font-size: 12px; color: transparent; background: var(--border); border-radius: 4px; width: 140px; height: 12px; margin-top: 6px; }
    .upgrade-prompt { background: var(--navy); border-radius: var(--radius-lg); padding: 20px; text-align: center; margin-bottom: 20px; }
    .empty-matches { text-align: center; padding: 60px 20px; }
  </style>
</head>
<body>

<div id="toast-container" class="toast-container"></div>

<div class="matches-page">
  <div class="matches-header">
    <div style="font-family:var(--font-display);font-size:22px;color:var(--navy);font-weight:600">Kyzm<span style="color:var(--copper)">yt</span></div>
    <div style="font-family:var(--font-display);font-size:22px;color:var(--navy)">My Matches</div>
    <div style="font-size:12px;color:var(--text-muted)" id="match-count">—</div>
  </div>

  <div class="matches-content">

    <!-- New matches row -->
    <div id="new-matches-section" style="display:none">
      <div class="section-label" style="margin-bottom:10px">New matches ✦</div>
      <div class="new-matches-row" id="new-matches-row"></div>
    </div>

    <!-- Who liked you (blurred for non-subscribers) -->
    <div id="liked-you-section" class="likes-you-section" style="display:none">
      <div class="section-label" style="margin-bottom:10px">People who liked you</div>
      <div id="liked-you-container"></div>
    </div>

    <!-- All matches -->
    <div>
      <div class="section-label" style="margin-bottom:10px">All matches</div>
      <div id="matches-list">
        <div style="text-align:center;padding:40px">
          <div class="spinner" style="margin:0 auto 12px"></div>
          <div style="font-size:13px;color:var(--text-muted)">Loading matches...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Bottom nav -->
<nav class="nav-bottom">
  <button class="nav-item" onclick="location.href='/pages/app.html'"><div class="nav-icon">⊙</div><div class="nav-label">Discover</div></button>
  <button class="nav-item active" onclick="location.href='/pages/matches.html'"><div class="nav-icon">♡</div><div class="nav-label">Matches</div></button>
  <button class="nav-item" onclick="location.href='/pages/messages.html'"><div class="nav-icon">✉</div><div class="nav-label">Messages</div></button>
  <button class="nav-item" onclick="location.href='/pages/community.html'"><div class="nav-icon">⊕</div><div class="nav-label">Community</div></button>
  <button class="nav-item" onclick="location.href='/pages/profile.html'"><div class="nav-icon">◎</div><div class="nav-label">Profile</div></button>
</nav>

<script type="module">
import { supabase, requireVerified, getMatches, calculateCompatibility, showToast, getInitials, avatarColor, formatRelativeTime } from '/js/supabase.js';

let currentUser = null;
let currentProfile = null;

async function init() {
  const result = await requireVerified();
  if (!result) return;
  currentUser = result.user;
  currentProfile = result.profile;
  await loadMatches();
  await loadLikes();
}

async function loadMatches() {
  const matches = await getMatches(currentUser.id);
  document.getElementById('match-count').textContent = `${matches.length} match${matches.length !== 1 ? 'es' : ''}`;

  const newMatches = matches.filter(m => {
    const age = Date.now() - new Date(m.matched_at).getTime();
    return age < 24 * 60 * 60 * 1000;
  });

  if (newMatches.length) {
    document.getElementById('new-matches-section').style.display = 'block';
    document.getElementById('new-matches-row').innerHTML = newMatches.map(m => {
      const other = getOther(m);
      const color = avatarColor(other.display_name);
      return `
        <div class="new-match-bubble" onclick="goToMessage('${m.id}')">
          <div class="match-ring" style="border-color:${color}">
            <div class="match-ring-inner" style="background:${color}">${getInitials(other.display_name)}</div>
            <div class="match-new-badge">✦</div>
          </div>
          <div class="match-bubble-name">${other.display_name || 'Member'}</div>
        </div>`;
    }).join('');
  }

  const list = document.getElementById('matches-list');
  if (!matches.length) {
    list.innerHTML = `
      <div class="empty-matches">
        <div style="font-size:48px;margin-bottom:16px">💫</div>
        <div style="font-family:var(--font-display);font-size:28px;color:var(--navy);margin-bottom:8px">No matches yet</div>
        <div style="font-size:14px;color:var(--text-muted);margin-bottom:24px">Go to Discover and connect with someone.</div>
        <a href="/pages/app.html" class="btn btn-copper">Find Matches →</a>
      </div>`;
    return;
  }

  list.innerHTML = matches.map(m => {
    const other = getOther(m);
    const color = avatarColor(other.display_name);
    const compat = currentProfile ? calculateCompatibility(currentProfile, other) : '—';
    const compatClass = compat >= 85 ? 'high' : '';
    return `
      <div class="match-list-item" onclick="goToMessage('${m.id}')">
        <div class="avatar avatar-md" style="background:${color};color:white;font-family:var(--font-display);font-size:16px">${getInitials(other.display_name)}</div>
        <div class="match-info">
          <div class="match-name">${other.display_name || 'Member'}</div>
          <div class="match-preview">${other.status_label?.replace(/_/g,' ') || 'Verified member'}</div>
          <div class="match-actions">
            <div class="match-compat-pill ${compatClass}">${compat}% match</div>
            <span class="badge badge-verified" style="font-size:10px">✓ Verified</span>
          </div>
        </div>
        <div class="match-time">${formatRelativeTime(m.matched_at)}</div>
      </div>`;
  }).join('');
}

async function loadLikes() {
  const { data: likes } = await supabase.from('likes').select('from_user, profiles!likes_from_user_fkey(display_name)').eq('to_user', currentUser.id);
  if (!likes?.length) return;

  const { data: sub } = await supabase.from('subscriptions').select('status').eq('user_id', currentUser.id).single();
  const isSubscriber = sub?.status === 'active';

  document.getElementById('liked-you-section').style.display = 'block';
  const container = document.getElementById('liked-you-container');

  if (!isSubscriber) {
    container.innerHTML = `
      <div class="upgrade-prompt">
        <div style="font-size:24px;margin-bottom:8px">👀</div>
        <div style="font-family:var(--font-display);font-size:20px;color:white;margin-bottom:6px">${likes.length} ${likes.length === 1 ? 'person has' : 'people have'} liked you</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:16px">Subscribe to see who they are and connect.</div>
        <a href="/pages/profile.html" class="btn btn-copper btn-full">Unlock — $29/mo</a>
      </div>
      ${likes.slice(0, 3).map(() => `
        <div class="blurred-profile">
          <div class="blurred-avatar">?</div>
          <div><div class="blurred-name"></div><div class="blurred-sub"></div></div>
        </div>`).join('')}`;
    return;
  }

  container.innerHTML = likes.map(l => {
    const name = l.profiles?.display_name;
    return `
      <div class="match-list-item" onclick="connectBack('${l.from_user}')">
        <div class="avatar avatar-md" style="background:${avatarColor(name)};color:white;font-family:var(--font-display);font-size:16px">${getInitials(name)}</div>
        <div class="match-info">
          <div class="match-name">${name || 'Member'}</div>
          <div class="match-preview">Liked your profile</div>
        </div>
        <button class="btn btn-copper btn-sm">Connect back</button>
      </div>`;
  }).join('');
}

function getOther(match) {
  return match.user_a === currentUser.id
    ? (match['profiles!matches_user_b_fkey'] || {})
    : (match['profiles!matches_user_a_fkey'] || {});
}

window.goToMessage = (matchId) => { window.location.href = `/pages/messages.html?match=${matchId}`; };
window.connectBack = async (userId) => {
  const { likeProfile } = await import('/js/supabase.js');
  const { matched } = await likeProfile(currentUser.id, userId);
  if (matched) showToast('It\'s a kyzmyt! Go say something.', 'copper');
  await loadMatches();
};

init();
</script>

</body>
</html>
