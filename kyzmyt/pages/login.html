<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9WSYHBGQZZ"></script>

  function gtag(){dataLayer.push(arguments);}

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kyzmyt — Sign In</title>
  <link rel="stylesheet" href="/css/design-system.css" />
  <style>
    .login-page { min-height: 100vh; display: flex; flex-direction: column; background: var(--cream); }
    .login-hero { background: var(--navy); padding: 60px 24px 40px; text-align: center; }
    .login-logo { font-family: var(--font-display); font-size: 52px; font-weight: 600; color: var(--white); margin-bottom: 8px; }
    .login-logo span { color: var(--copper); }
    .login-tagline { font-family: var(--font-display); font-style: italic; font-size: 16px; color: rgba(255,255,255,0.4); }
    .login-card { flex: 1; padding: 32px 24px; max-width: 400px; margin: 0 auto; width: 100%; }
    .login-title { font-family: var(--font-display); font-size: 28px; color: var(--navy); margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
    .forgot-link { font-size: 13px; color: var(--copper); text-align: right; display: block; margin-top: -10px; margin-bottom: 20px; }
    .magic-divider { text-align: center; color: var(--text-muted); font-size: 12px; margin: 4px 0 16px; }
  </style>
</head>
<body>

<div id="toast-container" class="toast-container"></div>

<div class="login-page">
  <div class="login-hero">
    <div class="login-logo">Kyzm<span>yt</span></div>
    <div class="login-tagline">Some connections are fate.</div>
  </div>

  <div class="login-card">
    <h2 class="login-title">Welcome back</h2>
    <p class="login-sub">Sign in to continue your search.</p>

    <div class="form-group">
      <label class="form-label">Email address</label>
      <input type="email" class="form-input" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" placeholder="Your password" autocomplete="current-password" />
    </div>
    <a href="#" class="forgot-link" onclick="forgotPassword()">Forgot password?</a>

    <button class="btn btn-copper btn-full btn-lg" onclick="signIn()">
      <span id="signin-text">Sign In</span>
      <span id="signin-spinner" class="spinner hidden"></span>
    </button>

    <div class="divider-text">or</div>

    <button class="btn btn-outline btn-full" onclick="googleSignIn()" style="margin-bottom:12px">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="magic-divider">or sign in with a magic link</div>
    <button class="btn btn-outline btn-full" onclick="magicLink()">Send Magic Link</button>

    <p style="text-align:center;margin-top:24px;font-size:13px;color:var(--text-muted)">
      Not a member yet? <a href="/pages/signup.html">Join Kyzmyt</a>
    </p>
  </div>
</div>

<script type="module">
import { supabase, showToast } from '/js/supabase.js';

window.signIn = async function() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (!email || !password) { showToast('Please fill in all fields', 'error'); return; }

  document.getElementById('signin-text').textContent = 'Signing in...';
  document.getElementById('signin-spinner').classList.remove('hidden');

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  document.getElementById('signin-text').textContent = 'Sign In';
  document.getElementById('signin-spinner').classList.add('hidden');

  if (error) { showToast(error.message, 'error'); return; }

  // Check verification status
  const { data: verif } = await supabase.from('verifications').select('background_clear, id_verified').eq('user_id', data.user.id).single();
  if (!verif?.id_verified) {
    window.location.href = '/pages/verify.html';
  } else if (!verif?.background_clear) {
    window.location.href = '/pages/verify.html';
  } else {
    window.location.href = '/pages/app.html';
  }
};

window.googleSignIn = async function() {
  const { error } = await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/pages/app.html' } });
  if (error) showToast(error.message, 'error');
};

window.magicLink = async function() {
  const email = document.getElementById('email').value;
  if (!email) { showToast('Enter your email first', 'error'); return; }
  const { error } = await supabase.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.origin + '/pages/app.html' } });
  if (error) { showToast(error.message, 'error'); return; }
  showToast('Magic link sent! Check your email.', 'success');
};

window.forgotPassword = async function() {
  const email = document.getElementById('email').value;
  if (!email) { showToast('Enter your email first', 'error'); return; }
  const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/pages/reset-password.html' });
  if (error) { showToast(error.message, 'error'); return; }
  showToast('Password reset email sent!', 'success');
};

// Handle Enter key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') signIn();
});

// Auto-redirect if already logged in
supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = '/pages/app.html';
});
</script>

</body>
</html>
